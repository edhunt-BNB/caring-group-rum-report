name: Publish report
on:
  push:
    paths:
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download report HTML
        run: |
          curl -sL --fail "https://pub.hyperagent.com/p/jiorga96RVauhlqRt8R3qQ" -o index.html
          test -s index.html
          echo "=== File size ==="
          wc -c index.html
          echo "=== First 300 chars ==="
          head -c 300 index.html
      - name: Commit report and self-delete workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git rm .github/workflows/publish.yml
          git commit -m "Publish report (auto-generated, workflow self-deleted)"
          git push
